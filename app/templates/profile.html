{% extends "base.html" %}

{% block title %}Профиль - Мафия{% endblock %}

{% block content %}
<div class="profile">
    <h2>Мой профиль</h2>
    <div class="profile-info">
        <div class="info-row">
            <strong>ID:</strong> {{ user.id }}
        </div>
        <div class="info-row">
            <strong>Username:</strong> {{ user.username }}
        </div>
        <div class="info-row">
            <strong>Email:</strong> {{ user.email }}
        </div>
    </div>
</div>
{% endblock %}
